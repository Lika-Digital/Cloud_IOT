# ============================================================================
# Eclipse Mosquitto 2.0 — Cloud IoT NUC v2.0 Configuration
# Persistence: messages and subscriptions survive reboots
# ============================================================================

# ── Network listeners ─────────────────────────────────────────────────────────
# MQTT standard port (Arduino Opta connects here)
listener 1883 0.0.0.0

# WebSocket port (for browser/mobile web clients if needed)
listener 9001 0.0.0.0
protocol websockets

# Allow anonymous connections (Arduino Opta, mobile app, backend)
# For production: configure client certificates or password_file
allow_anonymous true

# ── Persistence — messages survive reboots ────────────────────────────────────
# Store subscriber list and retained messages to disk
persistence          true
persistence_location /mosquitto/data/
persistence_file     mosquitto.db

# Write persistent data to disk every 60 seconds
autosave_interval    60
# Also save when this many subscription changes happen
autosave_on_changes  false

# Queue undelivered messages for offline clients (QoS 1+)
max_queued_messages  1000
max_inflight_messages 20

# Retain last known value for sensor topics (enables state recovery after reboot)
# Clients publish with retain=true; new subscribers get the last value immediately
# This is set by the Arduino Opta / publisher — not configured here

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest    file /mosquitto/log/mosquitto.log
log_dest    syslog
log_type    error
log_type    warning
log_type    notice
log_type    information
# Verbose connection logs (disable in production for high-traffic deployments)
connection_messages true
log_timestamp        true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Connection limits ─────────────────────────────────────────────────────────
max_connections      50
# Keep-alive timeout (seconds)
keepalive_interval   60

# ── Message limits ────────────────────────────────────────────────────────────
# Prevent rogue clients from flooding the broker
max_packet_size      65536
message_size_limit   65536
