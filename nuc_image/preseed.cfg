# ============================================================================
# Cloud IoT NUC v2.0 — Debian 12 Preseed (Self-Contained)
# All packages come from the ISO's local pool — no internet required.
# ============================================================================

# ── Localization ──────────────────────────────────────────────────────────────
d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/toggle select No toggling

# ── Network (DHCP during install — static IP configured on first boot) ────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string cloud-iot-nuc
d-i netcfg/get_domain string local

# ── Mirror — use only local ISO, no internet ─────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

# ── Add local package pool from ISO ──────────────────────────────────────────
# This allows apt-get to install from the bundled pool after base OS is up.
# The installer mounts the CD at /cdrom.
d-i apt-setup/local0/repository string \
  deb [trusted=yes] file:///cdrom/cloud-iot-pool local main
d-i apt-setup/local0/comment string Cloud IoT offline packages

# ── Clock & NTP ───────────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean false

# ── Partitioning — guided LVM, full disk (works for SATA + NVMe) ─────────────
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-basicfilesystems/no_swap boolean false
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true

# ── Users ────────────────────────────────────────────────────────────────────
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Cloud IoT Admin
d-i passwd/username string cloud-iot
d-i passwd/user-password password ChangeOnFirstLogin
d-i passwd/user-password-again password ChangeOnFirstLogin
d-i passwd/user-default-groups string sudo audio

# ── Package selection from local pool ─────────────────────────────────────────
# Basic system packages — all come from cloud-iot-pool bundled in the ISO.
# Docker CE is installed by install-cloud-iot.sh from the same pool.
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
  openssh-server \
  sudo \
  ca-certificates \
  gnupg \
  lsb-release \
  apt-transport-https \
  net-tools \
  ifupdown \
  iproute2 \
  iputils-ping \
  openssl \
  curl \
  wget \
  vim \
  htop \
  unzip \
  sqlite3 \
  logrotate \
  watchdog \
  mosquitto-clients

d-i pkgsel/upgrade select safe-upgrade
d-i pkgsel/update-policy select none
popularity-contest popularity-contest/participate boolean false

# ── Bootloader ────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i grub-installer/bootdev string default

# ── Late command — copy ALL ISO assets to target disk ─────────────────────────
# copy-assets.sh runs while the ISO is still mounted at /cdrom.
# After reboot the ISO is gone — everything must live on /opt/cloud-iot-assets.
d-i preseed/late_command string bash /cdrom/cloud-iot-setup/copy-assets.sh

# ── Finish ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
